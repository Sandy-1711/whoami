name: Build & Deploy Resume

on:
  push:
    branches: [main]
    # Only rebuild + redeploy when something that affects the published PDF or
    # the way it's served actually changed. Pushes that only touch the tooling
    # (packages/core, apps/cli, profile/, skills, docs) skip the whole job.
    paths:
      - 'resume.tex'
      - 'apps/web/**'
      - 'packages/core/src/check/**'
      - 'pnpm-lock.yaml'
      - 'tsconfig.base.json'
      - '.github/workflows/build-deploy.yml'
  # Manual trigger always runs, regardless of what changed.
  workflow_dispatch:

# A newer run supersedes an in-progress one on the same ref: cancel the old,
# run the latest.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check résumé source structure
        run: pnpm --filter @resume/cli run check:source

      - name: Compile LaTeX -> PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex

      - name: Stage PDF for deploy
        run: |
          mkdir -p apps/web/assets
          cp resume.pdf apps/web/assets/resume.pdf

      - name: Check résumé PDF structure (pages, width, sections)
        run: pnpm --filter @resume/cli run check:pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: resume-pdf
          path: apps/web/assets/resume.pdf
          if-no-files-found: error

      # The Vercel project's Root Directory is set to apps/web in the dashboard,
      # so the CLI deploys the self-contained web app from there. Run the CLI with
      # `pnpm dlx` (no global install — that fails on the runner's PATH).
      - name: Deploy to Vercel (production)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          pnpm dlx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          pnpm dlx vercel@latest deploy --prod --token="$VERCEL_TOKEN"
